# Extra autostart processes
# exec-once = uwsm app -- my-service

# Set wallpaper based on time of day (handles starting swaybg)
# Note: omarchy also starts swaybg, but this will override it after 2 seconds
exec-once = sleep 2 && ~/.local/bin/omarchy-theme-bg-auto

# Album picker overlay daemon (summoned with SUPER+A)
# Omarchy 4: remove once the picker is an omarchy-shell plugin (the shell hosts it)
exec-once = uwsm app -- qs -c albums
